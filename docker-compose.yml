version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

services:
  # ==================== INFRASTRUCTURE ====================

  # Eureka Server - Service Discovery
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    mem_limit: 512m
    ports:
      - "8761:8761"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -XX:+UseSerialGC
    networks:
      - eventhub-network
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    mem_limit: 1g
    ports:
      - "8180:8080"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx512m -XX:+UseG1GC
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - eventhub-network
    logging: *default-logging

  # ==================== MICROSERVICES ====================

  # Auth Service
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    mem_limit: 1g
    ports:
      - "8081:8081"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx512m -XX:+UseG1GC
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-users:5432/users_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-users:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eventhub-network
    logging: *default-logging

  # User Service
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    mem_limit: 512m
    ports:
      - "8082:8082"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -XX:+UseSerialGC
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-users:5432/users_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-users:
        condition: service_healthy
    networks:
      - eventhub-network
    logging: *default-logging

  # Tag Service
  tag-service:
    build:
      context: ./tag-service
      dockerfile: Dockerfile
    container_name: tag-service
    mem_limit: 512m
    ports:
      - "8087:8087"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -XX:+UseSerialGC
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-events:5432/events_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-events:
        condition: service_healthy
    networks:
      - eventhub-network
    logging: *default-logging

  # Event Service
  event-service:
    build:
      context: ./event-service
      dockerfile: Dockerfile
    container_name: event-service
    mem_limit: 1g
    ports:
      - "8083:8083"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx512m -XX:+UseG1GC
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-events:5432/events_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-events:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eventhub-network
    logging: *default-logging

  # Search Service
  search-service:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    container_name: search-service
    mem_limit: 1g
    ports:
      - "8085:8085"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx512m -XX:+UseG1GC
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - ELASTICSEARCH_URIS=http://elasticsearch:9200
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      eureka-server:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - eventhub-network
    logging: *default-logging

  # Like Service
  like-service:
    build:
      context: ./like-service
      dockerfile: Dockerfile
    container_name: like-service
    mem_limit: 512m
    ports:
      - "8084:8084"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -XX:+UseSerialGC
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-likes:5432/likes_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-likes:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eventhub-network
    logging: *default-logging

  # Registration Service
  registration-service:
    build:
      context: ./registration-service
      dockerfile: Dockerfile
    container_name: registration-service
    mem_limit: 512m
    ports:
      - "8089:8089"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -XX:+UseSerialGC
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-registrations:5432/registrations_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-registrations:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eventhub-network
    logging: *default-logging

  # Notification Service
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    mem_limit: 512m
    ports:
      - "8086:8086"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -XX:+UseSerialGC
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-notifications:5432/notifications_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-notifications:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - eventhub-network
    logging: *default-logging

  # File Service
  file-service:
    build:
      context: ./file-service
      dockerfile: Dockerfile
    container_name: file-service
    mem_limit: 512m
    ports:
      - "8088:8088"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -XX:+UseSerialGC
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION:-eu-north-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-eventhubkz-files}
      - AWS_S3_ENDPOINT=${AWS_S3_ENDPOINT:-}
      - AWS_S3_PUBLIC_URL=${AWS_S3_PUBLIC_URL:-}
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      eureka-server:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - eventhub-network
    logging: *default-logging

  # MinIO - S3-compatible object storage (dev)
  minio:
    image: minio/minio:latest
    container_name: minio
    mem_limit: 384m
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_KEY:-minioadmin123}
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio-data:/data
    networks:
      - eventhub-network
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # MinIO bucket initializer — creates bucket and applies public-read policy
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY:-minioadmin} ${AWS_SECRET_KEY:-minioadmin123} &&
      mc mb --ignore-existing local/${AWS_S3_BUCKET:-eventhubkz-files} &&
      mc anonymous set download local/${AWS_S3_BUCKET:-eventhubkz-files} &&
      echo 'MinIO ready: bucket=${AWS_S3_BUCKET:-eventhubkz-files} with public-read'
      "
    networks:
      - eventhub-network
    logging: *default-logging

  # ==================== DATABASES ====================

  # PostgreSQL - Users Database
  postgres-users:
    image: postgres:14
    container_name: postgres-users
    mem_limit: 256m
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - users-data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    networks:
      - eventhub-network
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d users_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL - Events Database
  postgres-events:
    image: postgres:14
    container_name: postgres-events
    mem_limit: 256m
    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - events-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - eventhub-network
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d events_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL - Likes Database
  postgres-likes:
    image: postgres:14
    container_name: postgres-likes
    mem_limit: 256m
    environment:
      POSTGRES_DB: likes_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - likes-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - eventhub-network
    logging: *default-logging

  # PostgreSQL - Registrations Database
  postgres-registrations:
    image: postgres:14
    container_name: postgres-registrations
    mem_limit: 256m
    environment:
      POSTGRES_DB: registrations_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - registrations-data:/var/lib/postgresql/data
    ports:
      - "5439:5432"
    networks:
      - eventhub-network
    logging: *default-logging

  # PostgreSQL - Notifications Database
  postgres-notifications:
    image: postgres:14
    container_name: postgres-notifications
    mem_limit: 256m
    environment:
      POSTGRES_DB: notifications_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - notifications-data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    networks:
      - eventhub-network
    logging: *default-logging

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: elasticsearch
    mem_limit: 1500m
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms768m -Xmx768m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - eventhub-network
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:6.2
    container_name: redis
    mem_limit: 256m
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - eventhub-network
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== KAFKA ====================

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    mem_limit: 384m
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx256m"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - eventhub-network
    logging: *default-logging

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    mem_limit: 768m
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - eventhub-network
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    profiles: ["observability"]
    mem_limit: 384m
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: eventhubkz
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
    networks:
      - eventhub-network
    logging: *default-logging

  # ==================== MONITORING ====================

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - eventhub-network
    logging: *default-logging

  # Grafana
  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - eventhub-network
    logging: *default-logging

  # Zipkin - Distributed Tracing
  zipkin:
    image: openzipkin/zipkin:2.24
    container_name: zipkin
    profiles: ["observability"]
    mem_limit: 384m
    ports:
      - "9411:9411"
    environment:
      - STORAGE_TYPE=mem
    networks:
      - eventhub-network
    logging: *default-logging

# ==================== VOLUMES ====================

volumes:
  users-data:
  events-data:
  likes-data:
  registrations-data:
  notifications-data:
  es-data:
  redis-data:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  prometheus-data:
  grafana-data:
  minio-data:

# ==================== NETWORKS ====================

networks:
  eventhub-network:
    driver: bridge
