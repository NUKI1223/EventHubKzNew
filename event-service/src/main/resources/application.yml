server:
  port: 8083

spring:
  application:
    name: event-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/events_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      client.dns.lookup: use_all_dns_ips
      reconnect.backoff.ms: 1000
      reconnect.backoff.max.ms: 30000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: event-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # ErrorHandlingDeserializer wraps JsonDeserializer so a message that can't be
      # deserialized (e.g. malformed payload on the cross-language event.candidate.found
      # topic) is logged and skipped instead of wedging the partition in a poison-pill
      # retry loop. Transparent for well-formed messages (delegates unchanged).
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: org.ngcvfb.eventhubkz.common.events

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cache:
    type: redis
    redis:
      time-to-live: 600000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
  metrics:
    distribution:
      percentiles-histogram:
        all: true
      slo:
        all: 50ms, 100ms, 250ms, 500ms, 1s, 2s
    tags:
      application: ${spring.application.name}

ai:
  gemini:
    api-key: ${GEMINI_API_KEY:}

logging:
  level:
    org.ngcvfb.eventservice: DEBUG
    org.springframework.kafka: INFO
