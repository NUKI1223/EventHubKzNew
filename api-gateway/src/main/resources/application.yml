server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      httpclient:
        connect-timeout: 5000
        response-timeout: 30s   # let a queued (slow) login finish instead of 504

      routes:
        # Auth - login/signup: rate limit per client IP (brute-force guard)
        - id: auth-login-signup-rl
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/login,/auth/signup
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
            - RewritePath=/auth/(?<segment>.*), /api/auth/${segment}

        # Auth - resend: strict rate limit per IP (email-bomb guard)
        - id: auth-resend-rl
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/resend
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 3
                redis-rate-limiter.requestedTokens: 1
            - RewritePath=/auth/(?<segment>.*), /api/auth/${segment}

        # Auth Service
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /api/auth/${segment}

        # User Service (authenticated endpoints)
        - id: user-service-me
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/me
          filters:
            - name: AuthenticationFilter

        # User Service - PUT/DELETE (authenticated; self-or-admin enforced downstream)
        - id: user-service-write
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**
            - Method=PUT,DELETE
          filters:
            - name: AuthenticationFilter

        # User Service reads — require auth (no anonymous directory/PII dump).
        # Internal service-to-service Feign (event-service attendee list, reminders)
        # talks to user-service directly via Eureka, bypassing this gateway filter.
        - id: user-service-read
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**
          filters:
            - name: AuthenticationFilter

        # AI - tag suggestion: authenticated, rate limit per user (Gemini quota guard)
        - id: ai-suggest-tags-rl
          uri: lb://EVENT-SERVICE
          predicates:
            - Path=/api/events/suggest-tags
            - Method=POST
          filters:
            - name: AuthenticationFilter
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1
            - name: CircuitBreaker
              args:
                name: eventServiceCircuitBreaker
                fallbackUri: forward:/fallback/events

        # Event Service - POST/PUT/DELETE (authenticated)
        - id: event-service-write
          uri: lb://EVENT-SERVICE
          predicates:
            - Path=/api/events/**
            - Method=POST,PUT,DELETE
          filters:
            - name: AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: eventServiceCircuitBreaker
                fallbackUri: forward:/fallback/events

        # Event Service - attendees (organizer-only, must be authenticated to inject headers)
        - id: event-attendees
          uri: lb://EVENT-SERVICE
          predicates:
            - Path=/api/events/*/attendees
            - Method=GET
          filters:
            - name: AuthenticationFilter

        # Event Service - GET (public)
        - id: event-service-read
          uri: lb://EVENT-SERVICE
          predicates:
            - Path=/api/events/**
            - Method=GET
          filters:
            - name: CircuitBreaker
              args:
                name: eventServiceCircuitBreaker
                fallbackUri: forward:/fallback/events

        # Event Requests (authenticated)
        - id: event-request-service
          uri: lb://EVENT-SERVICE
          predicates:
            - Path=/api/event-requests/**
          filters:
            - name: AuthenticationFilter

        # Like Service (public endpoints - count, counts, check)
        - id: like-service-public
          uri: lb://LIKE-SERVICE
          predicates:
            - Path=/api/likes/event/*/count,/api/likes/counts,/api/likes/check

        # Like Service (authenticated endpoints)
        - id: like-service-auth
          uri: lb://LIKE-SERVICE
          predicates:
            - Path=/api/likes/**
          filters:
            - name: AuthenticationFilter

        # Registration Service (public endpoints - count, counts, check)
        - id: registration-service-public
          uri: lb://REGISTRATION-SERVICE
          predicates:
            - Path=/api/registrations/event/*/count,/api/registrations/counts,/api/registrations/check

        # Registration Service (authenticated endpoints)
        - id: registration-service-auth
          uri: lb://REGISTRATION-SERVICE
          predicates:
            - Path=/api/registrations/**
          filters:
            - name: AuthenticationFilter

        # Search Service
        - id: search-service
          uri: lb://SEARCH-SERVICE
          predicates:
            - Path=/api/search/**

        # Notification Service
        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: AuthenticationFilter

        # Tag Service - writes (authenticated; admin enforced downstream, except /by-names lookup)
        - id: tag-service-write
          uri: lb://TAG-SERVICE
          predicates:
            - Path=/api/tags/**
            - Method=POST,PUT,DELETE
          filters:
            - name: AuthenticationFilter

        # Tag Service - public reads
        - id: tag-service
          uri: lb://TAG-SERVICE
          predicates:
            - Path=/api/tags/**

        # Audit Service — admin-only journal (MUST precede the /api/admin/** rewrite route)
        - id: audit-service-admin
          uri: lb://AUDIT-SERVICE
          predicates:
            - Path=/api/admin/audit/**,/api/admin/audit
          filters:
            - name: AuthenticationFilter

        # Admin - Event Requests (routes to event-service)
        - id: admin-service
          uri: lb://EVENT-SERVICE
          predicates:
            - Path=/api/admin/**
          filters:
            - RewritePath=/api/admin/(?<segment>.*), /api/event-requests/${segment}
            - name: AuthenticationFilter

        # AI - support chat: authenticated, rate limit per user (Gemini quota guard)
        - id: ai-support-chat-rl
          uri: lb://EVENT-SERVICE
          predicates:
            - Path=/api/support/chat
            - Method=POST
          filters:
            - name: AuthenticationFilter
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1

        # Support Messages (event-service)
        - id: support-service
          uri: lb://EVENT-SERVICE
          predicates:
            - Path=/api/support/**
          filters:
            - name: AuthenticationFilter

        # File Service
        - id: file-service
          uri: lb://FILE-SERVICE
          predicates:
            - Path=/api/files/**
          filters:
            - name: AuthenticationFilter
            - name: RequestSize
              args:
                maxSize: 10MB

        # Ingestion Service (admin-only; Python service reads X-User-Role, gateway injects it)
        - id: ingestion-service
          uri: http://ingestion-service:8092
          predicates:
            - Path=/api/ingestion/**
          filters:
            - name: AuthenticationFilter

      default-filters: []

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

app:
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

security:
  jwt:
    # Должен совпадать с auth-service, иначе gateway не валидирует выданные им токены.
    # Задаётся только через окружение (.env) — дефолта нет намеренно.
    secret-key: ${JWT_SECRET}

resilience4j:
  circuitbreaker:
    instances:
      eventServiceCircuitBreaker:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  tracing:
    sampling:
      probability: 0.1
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
  metrics:
    distribution:
      percentiles-histogram:
        all: true
      slo:
        all: 50ms, 100ms, 250ms, 500ms, 1s, 2s
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.ngcvfb.apigateway: INFO
